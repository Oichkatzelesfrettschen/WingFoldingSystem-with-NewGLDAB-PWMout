; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = uno

[env:uno]
; Pin platform version for reproducible builds (PlatformIO atmelavr 4.2.0 recommended for Arduino compatibility)
; Using caret (^) allows patch updates while maintaining major.minor compatibility
platform = atmelavr@^4.2.0
board = uno
framework = arduino
lib_deps = 
	Servo
monitor_speed = 9600
; Build flags optimized for safety-critical embedded systems
; -Wall -Wextra: Enable comprehensive warnings
; -Werror: Treat warnings as errors (safety-critical requirement)
; -Os: Optimize for size (critical for Arduino memory constraints)
; -ffunction-sections -fdata-sections: Enable linker garbage collection
; -flto: Link-time optimization for size reduction
build_flags = 
	-Wall
	-Wextra
	-Werror
	-Os
	-ffunction-sections
	-fdata-sections
	-flto
	-DARDUINO_AVR_UNO

