\* TLA+ Model Checking Configuration for Wing Folding System

\* Specification to check
SPECIFICATION Spec

\* Constants definition
CONSTANTS
  MIN_PWM = 900
  MAX_PWM = 2100
  GLIDE_THRESHOLD = 950
  FOLD_THRESHOLD = 1080
  SERVO_COUNT = 8
  CHANNEL_COUNT = 8

\* Type invariant (always checked)
INVARIANT TypeInvariant

\* Safety invariants to check
INVARIANT SafetyInvariant
INVARIANT ServoRangeSafety
INVARIANT MotorRangeSafety
INVARIANT FoldThrottleSafety
INVARIANT GlideThrottleSafety
INVARIANT WingPhaseBounds
INVARIANT FoldTimerBounds

\* Properties to verify
PROPERTY AlwaysResponsive
PROPERTY FoldingEventuallyCompletes

\* Model checking parameters
\* Uncomment to enable symmetry reduction
\* SYMMETRY Permutations

\* State space constraints for feasible model checking
CONSTRAINT wingPhase < 100
CONSTRAINT foldTimer < 1000

\* Action properties
\* CHECK_DEADLOCK TRUE

\* View (for state graph visualization)
\* VIEW
