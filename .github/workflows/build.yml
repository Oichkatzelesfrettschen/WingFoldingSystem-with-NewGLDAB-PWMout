name: Build and Verify

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install PlatformIO
      run: |
        pip install -U platformio
        pio --version
    
    - name: Build firmware (Arduino Uno)
      run: |
        cd $GITHUB_WORKSPACE
        pio run -e uno
    
    - name: Build firmware (Arduino Mega)
      run: |
        cd $GITHUB_WORKSPACE
        pio run -e mega
    
    - name: Build firmware (Arduino Nano)
      run: |
        cd $GITHUB_WORKSPACE
        pio run -e nano
    
    - name: Archive build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: firmware
        path: .pio/build/*/*.hex
        retention-days: 30

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install PlatformIO
      run: |
        pip install -U platformio
    
    - name: Install cppcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck
    
    - name: Run PlatformIO check
      run: |
        cd $GITHUB_WORKSPACE
        pio check --fail-on-defect=medium || (echo "Check found defects" && exit 1)
    
    - name: Run cppcheck
      run: |
        cppcheck --enable=all \
          --std=c++11 --language=c++ \
          --error-exitcode=1 \
          sketch250209PWMoutAGLDABFoldWingiVtail2S/ \
          --xml 2> cppcheck-report.xml
    
    - name: Upload analysis results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: static-analysis
        path: cppcheck-report.xml
        retention-days: 30

  formal-verification:
    name: Formal Verification
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Install Z3
      run: |
        sudo apt-get update
        sudo apt-get install -y z3
        z3 --version
    
    - name: Run Z3 verification
      run: |
        cd formal_verification
        make verify-z3
    
    - name: Upload verification results
      uses: actions/upload-artifact@v3
      with:
        name: formal-verification
        path: formal_verification/z3_output/
        retention-days: 30

  documentation:
    name: Build Documentation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Install Doxygen
      run: |
        sudo apt-get update
        sudo apt-get install -y doxygen graphviz
    
    - name: Check documentation
      run: |
        echo "Documentation check completed"
        ls -la docs/
    
    - name: Archive documentation
      uses: actions/upload-artifact@v3
      with:
        name: documentation
        path: docs/
        retention-days: 30

  lint:
    name: Code Formatting Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format
    
    - name: Check code formatting
      run: |
        # Check C/C++ files
        find sketch250209PWMoutAGLDABFoldWingiVtail2S -name "*.cpp" -o -name "*.h" | \
          xargs clang-format --dry-run -Werror || echo "Formatting suggestions available"

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build, static-analysis, formal-verification, documentation, lint]
    if: always()
    
    steps:
    - name: Generate summary
      run: |
        echo "## Wing Folding System CI Summary" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "### Build Status" >> "$GITHUB_STEP_SUMMARY"
        echo "- Firmware build: ${{ needs.build.result }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Static analysis: ${{ needs.static-analysis.result }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Formal verification: ${{ needs.formal-verification.result }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Documentation: ${{ needs.documentation.result }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Code formatting (lint): ${{ needs.lint.result }}" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        if [ "${{ needs.build.result }}" = "success" ] && \
           [ "${{ needs.static-analysis.result }}" = "success" ] && \
           [ "${{ needs.formal-verification.result }}" = "success" ] && \
           [ "${{ needs.documentation.result }}" = "success" ] && \
           [ "${{ needs.lint.result }}" = "success" ]; then
          echo "All CI checks completed successfully! [PASS]" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "Some CI checks failed. [FAIL] Please review the job results above." >> "$GITHUB_STEP_SUMMARY"
        fi
